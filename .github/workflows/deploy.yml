name: Deploy Service

on:
  push:
    branches: [ main ]

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
  SERVICE_NAME: progress

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x
          
      - name: Restore
        run: dotnet restore
        
      - name: Test
        run: dotnet test --no-restore --collect:"XPlat Code Coverage"
        
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REGISTRY/dotlearn-$SERVICE_NAME:${{ github.sha }} .
        docker tag $ECR_REGISTRY/dotlearn-$SERVICE_NAME:${{ github.sha }} $ECR_REGISTRY/dotlearn-$SERVICE_NAME:latest
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
          
      - name: Push to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker push $ECR_REGISTRY/dotlearn-$SERVICE_NAME:${{ github.sha }}
          docker push $ECR_REGISTRY/dotlearn-$SERVICE_NAME:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/dotlearn
            aws ecr get-login-password --region ap-southeast-2 | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
            sudo docker compose -f docker-compose.prod.yml pull ${{ env.SERVICE_NAME }}
            sudo docker compose -f docker-compose.prod.yml up -d
