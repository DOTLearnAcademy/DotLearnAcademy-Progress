name: Deploy Service

on:
  push:
    branches: [ dev ]

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-2.amazonaws.com
  SERVICE_NAME: progress

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x
          
      - name: Restore
        run: dotnet restore
        
      - name: Test
        run: dotnet test --no-restore --collect:"XPlat Code Coverage"
        
      - name: Build Docker Image
        run: docker build -t $ECR_REGISTRY/dotlearn-$SERVICE_NAME:${{ github.sha }} .
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
          
      - name: Push to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker push $ECR_REGISTRY/dotlearn-$SERVICE_NAME:${{ github.sha }}
